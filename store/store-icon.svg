<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- light -> dark -> light, echoing the extension's edge-gradient feature -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)"/>

  <!-- window -->
  <rect x="28" y="33" width="72" height="62" rx="9" fill="#ffffff"/>
  <!-- title bar divider -->
  <path d="M28 51h72" stroke="#e9d5ff" stroke-width="2.5"/>
  <!-- traffic-light dots -->
  <circle cx="37" cy="42" r="2.4" fill="#c4b5fd"/>
  <circle cx="45" cy="42" r="2.4" fill="#c4b5fd"/>
  <!-- name label in the title bar -->
  <rect x="56" y="39" width="34" height="6" rx="3" fill="#7c3aed"/>
  <!-- content lines -->
  <rect x="38" y="61" width="52" height="6" rx="3" fill="#c4b5fd"/>
  <rect x="38" y="73" width="40" height="6" rx="3" fill="#ddd6fe"/>
  <rect x="38" y="85" width="30" height="6" rx="3" fill="#ddd6fe"/>
</svg>
